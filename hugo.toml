baseURL = "https://3nin-dotabata.com/"
languageCode = "ja"
title = "３人子育てドタバタ母さんの奮闘日記"
theme = "PaperMod"
defaultContentLanguage = "ja"
hasCJKLanguage = true

[pagination]
  pagerSize = 10

[params]
  author = "ドタバタ母さん"
  description = "3人の子供（小学１・４・６年生）を育てる、常にフル回転な母です！カオスすぎる我が家の日常を笑い飛ばしながら更新中。"
  homeInfoParams = {Title = "🍺 ようこそ！ドタバタ母さんの奮闘日記へ", Content = "小学6・4・1年生の3人を育てる40代の訪問看護師です。白目をむきながらも今日もなんとか生きてる！そんな日常をのんびり綴っています😊"}
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 1
    keys = ["title", "permalink", "summary", "content"]
  
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    name = "記事一覧"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "タグ"
    url = "/tags/"
    weight = 15
  [[menu.main]]
    name = "アーカイブ"
    url = "/archives/"
    weight = 18
  [[menu.main]]
    name = "🔍 検索"
    url = "/search/"
    weight = 19
  [[menu.main]]
    name = "プロフィール"
    url = "/about/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
