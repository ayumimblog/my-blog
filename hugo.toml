baseURL = "https://3nin-dotabata.com/"
languageCode = "ja"
title = "３人子育てドタバタ母さんの奮闘日記"
theme = "PaperMod"
defaultContentLanguage = "ja"
hasCJKLanguage = true
timeZone = "Asia/Tokyo"

[pagination]
  pagerSize = 10

[params]
  author = "ドタバタ母さん"
  tagline = "毎日カオス、それでも笑える子育て日記"
  description = "3人の子供（小学１・４・６年生）を育てる、常にフル回転な母です！カオスすぎる我が家の日常を笑い飛ばしながら更新中。"
  homeInfoParams = {Title = "🍺 ようこそ！ドタバタ母さんの奮闘日記へ", Content = "小6・小4・小1の3人を育てる訪問看護師、ドタバタ母さんです。毎日フル回転のカオスな日常を、笑い飛ばしながら更新中。「うちだけじゃないんだ」とほっとできるブログを目指しています😊"}

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 1
    keys = ["title", "permalink", "summary", "content"]
  
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    name = "記事一覧"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "タグ"
    url = "/tags/"
    weight = 15
  [[menu.main]]
    name = "シリーズ"
    url = "/series/"
    weight = 16
  [[menu.main]]
    name = "アーカイブ"
    url = "/archives/"
    weight = 18
  [[menu.main]]
    name = "🔍 検索"
    url = "/search/"
    weight = 19
  [[menu.main]]
    name = "プロフィール"
    url = "/about/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
# updated 2026年 6月 4日 木曜日 07時25分20秒 JST
