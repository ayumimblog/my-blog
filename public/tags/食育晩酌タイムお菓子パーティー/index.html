    <p> 最近、わが家の長男にまつわる「食」のエピソードが更新されました。
先日、仕事から帰宅すると、ゴミ箱に見慣れないお菓子の空袋が山積みに……。 どうやら私が不在の間、長男が妹を連れてコンビニへ買い出しに行っていたようです。
